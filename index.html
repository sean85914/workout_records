<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運動記錄</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
      "imports": {
        "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
      }
    }
    </script>
</head>
<body>
    <div id="trend-section">
        <h2 id="trend-title">最近 12<label id="trend-period"> 週</label>趨勢</h2>
        <div id="trend-controls">
            <div id="type-toggle">
                <button class="type-btn active" data-type="Swim">游泳</button>
                <button class="type-btn" data-type="Ride">單車</button>
                <button class="type-btn" data-type="Run">跑步</button>
                <button class="type-btn" data-type="WeightTraining">重訓</button>
            </div>
            <div id="period-toggle">
                <button class="period-btn active" data-period="week">週</button>
                <button class="period-btn" data-period="month">月</button>
            </div>
        </div>
        <div id="trend-chart"></div>
    </div>
    <div id="dashboard-header">
        <h2 id="dashboard-title">最近 <label id="recentDays">7</label> 天</h2>
        <div id="dashboard-toggle">
            <button class="toggle-btn active" data-range="7">本週</button>
            <button class="toggle-btn" data-range="30">本月</button>
        </div>
    </div>
    <div id="dashboard"></div>
    <div id="best-records-section">
        <h2>🏆 個人最佳</h2>
        <div id="best-records"></div>
    </div>
    <div class="actions">
        <button id="openReportBtn">生成報表</button>
        <button id="downloadBtn" disabled="true">下載報表</button>
    </div>
    <div id="rowTooltip"></div>
    <dialog id="reportDialog">
        <form method="dialog">
            <h3>選擇報表月份</h3>
            <label>
                年份與月份:
                <input type="month" id="reportTargetMonth">
            </label>
            <div style="margin-top: 15px;">
                <button type="button" id="cancelBtn">取消</button>
                <button type="submit" id="confirmBtn">確定</button>
            </div>
        </form>
    </dialog>
    <div id="chart" class="chart-container"></div>
    <canvas id="exportCanvas"></canvas>
    <script type="module" src="./scripts/index.js"></script>
</body>
</html>
