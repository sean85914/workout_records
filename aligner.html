<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牙套計時器</title>
  <link rel="icon" href="https://www.invisalign.com/favicon.ico" type="image/x-icon">
  <style>
    button {
      font-size: 16px;
    }
    .container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <p>今日配戴時間</p>
  <h1 id="time">00:00:00</h1>
  <p id="currentState">目前狀態: 未配戴</p>
</div>
<button onclick="toggle()">開始/關閉</button>
<button onclick="downloadData()">下載歷史數據</button>

<script>
const KEY = "alignerData";
const defaultState = {
  "today": {
    date: todayStr(),
    total: 0,
    running: false,
    lastStart: null,
  }
};


function todayStr() {
  // YYYY-mm-dd
  return new Date().toISOString().slice(0, 10);
}

function load() {
  let data = JSON.parse(localStorage.getItem(KEY)) || defaultState;

  // 如果是新的一天 → reset
  if (data.today && data.today.date && data.today.date !== todayStr()) {
    data[data.today.date] = data.today;
    const state = data.today.running;
    data.today = {
      date: todayStr(),  // 今日日期
      total: 0,  // 今日佩戴時間
      running: state,  // 是否正在配戴
      lastStart: null  // 上次開始配戴時間
    };
  }

  return data;
}

// 將資料存進localStorage
function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

function getCurrentTotal(data) {
  if (!data || !data.today) return "0";
  if (!data.today.running) return data.today.total;
  return data.today.total + (Date.now() - data.today.lastStart);
}

// ms轉為HH:MM:SS
function format(ms) {
  let sec = Math.floor(ms / 1000) % 60;
  let min = Math.floor(ms / 60000) % 60;
  let hr  = Math.floor(ms / 3600000);

  return `${hr.toString().padStart(2,"0")}:` +
         `${min.toString().padStart(2,"0")}:` +
         `${sec.toString().padStart(2,"0")}`;
}

// 更新頁面
function update() {
  let data = load();
  let t = getCurrentTotal(data);
  document.getElementById("time").innerText = format(t);
  document.getElementById("currentState").innerText = `目前狀態: ${data.today.running ? "配戴中" : "未配戴"}`;
}

// 更新狀態
function toggle() {
  let data = load();

  if (data.today.running) {
    // stop
    data.today.total = getCurrentTotal(data);
    data.today.running = false;
    data.today.lastStart = null;
    document.getElementById("currentState").innerText = `目前狀態: 未配戴`;
  } else {
    // start
    data.today.running = true;
    data.today.lastStart = Date.now();
    document.getElementById("currentState").innerText = `目前狀態: 配戴中`;
  }

  save(data);
  update();
}

function downloadData() {
  const data = load();

  const blob = new Blob([JSON.stringify(data, null, 4)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `timer-${todayStr()}.json`;
  a.click();

  URL.revokeObjectURL(url);
}

// 每秒更新畫面（但不依賴它計時）
setInterval(update, 1000);
update();
</script>

</body>
</html>
