<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牙套計時器</title>
  <link rel="icon" href="https://www.invisalign.com/favicon.ico" type="image/x-icon">
  <style>
    button {
      font-size: 16px;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, auto);
      gap: 0px; /* 元素間距 */
      align-items: center;
      justify-items: center;
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .lastStartTime {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>

<div class="container">
  <p>今日配戴時間</p>
  <p>目前狀態</p>
  <p>上次配戴時間</p>
  <h1 id="time">00:00:00</h1>
  <p id="currentState">未配戴</p>
  <div class="lastStartTime">
    <p id="lastStart"></p>
    <button onclick="edit()" id="edit">✏️</button>
  </div>
</div>
<button id="toggleBtn" onclick="toggle()">開始配戴</button>
<button onclick="downloadData()">下載歷史數據</button>
<dialog id="editLastStart">
  <input type="datetime-local" id="selectTime">
  <button id="confirm">確認</button>
  <button id="cancel">取消</button>
</dialog>

<script>
const KEY = "alignerData";
const defaultState = {
  "today": {
    date: todayStr(),
    total: 0,
    running: false,
    lastStart: null,
  }
};


function todayStr() {
  // YYYY-mm-dd
  return new Date().toISOString().slice(0, 10);
}

function startOfToday() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function formatDate(date = new Date()) {
  const pad = (n) => n.toString().padStart(2, '0');

  return `${date.getFullYear()}-` +
         `${pad(date.getMonth() + 1)}-` +
         `${pad(date.getDate())} ` +
         `${pad(date.getHours())}:` +
         `${pad(date.getMinutes())}:` +
         `${pad(date.getSeconds())}`;
}

function load() {
  let data = JSON.parse(localStorage.getItem(KEY)) || defaultState;

  // 如果是新的一天則重置
  if (data.today && data.today.date && data.today.date !== todayStr()) {
    const state = data.today.running;
    // 如果還在配戴，更新昨日總配戴時間
    if (state && data.today.lastStart) {
      const midnight = startOfToday();
      data.today.total += midnight - data.today.lastStart;
    }
    // 儲存昨日資訊
    data[data.today.date] = data.today;

    // 更新今日資訊
    data.today = {
      date: todayStr(),  // 今日日期
      total: 0,  // 今日配戴時間
      running: state,  // 是否正在配戴
      lastStart: state ? startOfToday() : null  // 上次開始配戴時間
    };
  }

  return data;
}

// 將資料存進localStorage
function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

function getCurrentTotal(data) {
  if (!data || !data.today) return "0";
  if (!data.today.running) return data.today.total;
  return data.today.total + (Date.now() - data.today.lastStart);
}

// ms轉為HH:MM:SS
function format(ms) {
  let sec = Math.floor(ms / 1000) % 60;
  let min = Math.floor(ms / 60000) % 60;
  let hr  = Math.floor(ms / 3600000);

  return `${hr.toString().padStart(2,"0")}:` +
         `${min.toString().padStart(2,"0")}:` +
         `${sec.toString().padStart(2,"0")}`;
}

// 更新頁面
function update() {
  let data = load();
  let t = getCurrentTotal(data);
  document.getElementById("time").innerText = format(t);
  if (data.today) {
    if (data.today.running) {
      document.getElementById("toggleBtn").innerText = "結束配戴";
    } else {
      document.getElementById("toggleBtn").innerText = "開始配戴";
    }
  }
}

// 更新狀態
function toggle() {
  let data = load();

  if (data.today.running) {
    // stop
    data.today.total = getCurrentTotal(data);
    data.today.running = false;
    data.today.lastStart = null;
    document.getElementById("currentState").innerText = "未配戴";
  } else {
    // start
    data.today.running = true;
    data.today.lastStart = Date.now();
    document.getElementById("currentState").innerText = "配戴中";
    document.getElementById("lastStart").innerText = `${formatDate(data.today.lastStart)}`;
  }

  save(data);
  update();
}

function downloadData() {
  const data = load();
  if (data.today.running && data.today.lastStart) {
    data.today.total += Date.now() - data.today.lastStart;
  }

  const blob = new Blob([JSON.stringify(data, null, 4)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `timer-${todayStr()}.json`;
  a.click();

  URL.revokeObjectURL(url);
}

function edit() {
  const data = load();

  // 如果有 lastStart，填入 input
  if (data.today.lastStart) {
    const d = new Date(data.today.lastStart);
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    document.getElementById("selectTime").value = d.toISOString().slice(0, 16);  // 到分鐘
  }

  document.getElementById("editLastStart").showModal();
}

document.getElementById("cancel").addEventListener("click", () => {
  document.getElementById("editLastStart").close();
});

document.getElementById("confirm").addEventListener("click", () => {
  const data = load();

  const newTime = new Date(document.getElementById("selectTime").value).getTime();

  if (!isNaN(newTime)) {
    data.today.lastStart = newTime;

    // 如果正在 running，要同步修正 total（避免跳動）
    if (data.today.running) {
      data.today.lastStart = newTime;
    }

    localStorage.setItem(KEY, JSON.stringify(data));
  }

  document.getElementById("editLastStart").close();
  update(); // refresh UI
});

// 每秒更新畫面（但不依賴它計時）
setInterval(update, 1000);
update();
const data = load();
document.getElementById("currentState").innerText = `${data.today.running ? "配戴中" : "未配戴"}`;
if (data.today.lastStart) {
  const date = new Date(data.today.lastStart);
  document.getElementById("lastStart").innerText = `${formatDate(date)}`;
}
</script>

</body>
</html>
